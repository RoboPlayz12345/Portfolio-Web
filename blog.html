<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog | Aarav Chauhan</title>
<link rel="icon" type="image/png" href="portfoliologo.png">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* === KEEPING YOUR ORIGINAL THEME === */

.blog-container { padding-top: 80px; }

.blog-hero {
    padding: 4rem 2rem;
    text-align: center;
    max-width: 1200px;
    margin: 0 auto;
}

.blog-hero h1 {
    font-size: 3rem;
    font-weight: 800;
    margin-bottom: 1rem;
    color: var(--text);
}

.blog-hero p {
    font-size: 1.1rem;
    color: var(--text-dim);
    max-width: 600px;
    margin: 0 auto;
}

.blog-posts {
    display: grid;
    gap: 2rem;
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem;
}

.blog-post-preview {
    background: rgba(59,130,246,0.05);
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 10px;
    padding: 2rem;
    cursor: pointer;
    transition: all 0.3s ease;
}

.blog-post-preview:hover {
    background: rgba(59,130,246,0.1);
    border-color: var(--accent);
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(59,130,246,0.2);
}

.blog-meta {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    font-size: 0.9rem;
    color: var(--accent);
}

.blog-date {
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.blog-category {
    background: rgba(60,131,246,0.2);
    padding: 0.25rem 0.75rem;
    border-radius: 4px;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
}

.blog-post-preview h2 {
    font-size: 1.8rem;
    margin: 1rem 0 0.5rem;
    color: var(--text);
}

.blog-preview-text {
    color: var(--text-dim);
    line-height: 1.8;
    margin-bottom: 1rem;
}

.read-more {
    color: var(--accent);
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    transition: all 0.3s ease;
}

.blog-post-preview:hover .read-more {
    gap: 1rem;
}

.blog-full-post {
    display: none;
    background: rgba(59,130,246,0.05);
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 10px;
    padding: 3rem;
    margin-top: 1rem;
    line-height: 1.8;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
}

.blog-full-post.active {
    display: block;
}

.blog-full-post h2 {
    font-size: 2.2rem;
    margin-bottom: 1rem;
}

.blog-full-post .blog-meta {
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid rgba(59,130,246,0.2);
}

.blog-full-post p {
    margin-bottom: 1.5rem;
    color: var(--text-dim);
    font-size: 1.05rem;
}

.blog-full-post h3 {
    color: var(--accent);
    margin-top: 2rem;
    margin-bottom: 1rem;
    font-size: 1.3rem;
}

.blog-full-post ul, .blog-full-post ol {
    margin-left: 2rem;
    margin-bottom: 1.5rem;
}

.blog-full-post li {
    margin-bottom: 0.5rem;
    color: var(--text-dim);
}

.back-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
    margin-bottom: 2rem;
    transition: all 0.3s ease;
}

.back-btn:hover {
    gap: 1rem;
}

@media (max-width: 768px) {
    .blog-hero h1 {
        font-size: 2rem;
    }

    .blog-full-post {
        padding: 1.5rem;
    }

    .blog-post-preview {
        padding: 1.5rem;
    }
}
</style>
</head>

<body>

<div class="nav-container">
<a href="index.html" class="nav-logo">Aarav<span>.</span></a>

<div class="hamburger">
    <span class="bar"></span>
    <span class="bar"></span>
    <span class="bar"></span>
</div>

<ul class="nav-menu">

<li><a href="index.html#contact">Contact</a></li>
</ul>
<div class="nav-actions">
<a href="port.pdf" class="nav-download-btn" download>Download CV</a>
</div>
</div>
</nav>

<div class="blog-container">
<div class="blog-hero">
<h1>My Blog</h1>
<p>Documenting my journey in tech, AI, and building meaningful projects.</p>
<input type="text" placeholder="Search posts..." oninput="searchPosts(this.value)" style="
    margin-top: 1.5rem;
    padding: 0.8rem 1rem;
    width: 300px;
    border-radius: 8px;
    border: 1px solid rgba(59,130,246,0.3);
    background: rgba(59,130,246,0.05);
    color: var(--text);
">
</div>

<div class="blog-posts"></div>
</div>

<footer>
<p>&copy; 2026 Aarav Chauhan. Built with passion for coding and innovation.</p>
</footer>

<script>
/* === NAVBAR TOGGLE LOGIC === */
const hamburger = document.querySelector('.hamburger');
const navMenu = document.querySelector('.nav-menu');

if (hamburger) {
    hamburger.addEventListener('click', () => {
        navMenu.classList.toggle('active');
        hamburger.classList.toggle('active');
    });
}

// Close mobile menu when a link is clicked
document.querySelectorAll('.nav-menu a').forEach(link => {
    link.addEventListener('click', () => {
        navMenu.classList.remove('active');
        hamburger.classList.remove('active');
    });
});


/* === DYNAMIC POSTS FROM GITHUB JSON === */

const GITHUB_JSON_URL = "https://raw.githubusercontent.com/RoboPlayz12345/blog-connect/main/posts.json";

let allPosts = [];

async function loadPosts() {
    try {
        const res = await fetch(GITHUB_JSON_URL + "?t=" + new Date().getTime());
        if(!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
        const posts = await res.json();

        allPosts = posts.filter(p => p.Published);
        renderPosts(allPosts);
    } catch (err) {
        document.querySelector('.blog-posts').innerHTML = "<p style='color:red;'>Error loading posts. Make sure your JSON raw URL is correct.</p>";
        console.error("Error fetching posts:", err);
    }
}

function renderPosts(posts) {
    const container = document.querySelector('.blog-posts');
    container.innerHTML = "";

    if(posts.length === 0){
        container.innerHTML = "<p>No posts found.</p>";
        return;
    }

    posts.forEach((post, index) => {
        container.innerHTML += `
        <div class="blog-post-preview" onclick="showPost(${index})">
            <div class="blog-meta">
                <span class="blog-date"><i class="fas fa-calendar"></i> ${post.Date}</span>
                <span class="blog-category">${post.Category}</span>
            </div>
            <h2>${post.Name}</h2>
            <p class="blog-preview-text">${post.Content.length > 150 ? post.Content.substring(0,150) + "..." : post.Content}</p>
            <span class="read-more">Read More <i class="fas fa-arrow-right"></i></span>
        </div>`;
    });
}

function showPost(index) {
    const post = allPosts[index];
    const container = document.querySelector('.blog-posts');

    container.innerHTML = `
    <div class="blog-full-post active">
        <a href="#" class="back-btn" onclick="renderPosts(allPosts); return false;">
            <i class="fas fa-arrow-left"></i> Back to Posts
        </a>
        <h2>${post.Name}</h2>
        <div class="blog-meta">
            <span class="blog-date"><i class="fas fa-calendar"></i> ${post.Date}</span>
            <span class="blog-category">${post.Category}</span>
        </div>
        <p>${post.Content.replace(/\n/g,'<br>')}</p>
    </div>`;
    window.scrollTo(0,0);
}

function searchPosts(query) {
    const filtered = allPosts.filter(post =>
        post.Name.toLowerCase().includes(query.toLowerCase()) ||
        post.Category.toLowerCase().includes(query.toLowerCase())
    );
    renderPosts(filtered);
}

loadPosts();
</script>

</body>
