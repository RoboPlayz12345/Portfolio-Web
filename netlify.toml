[build]
  command = "echo 'Portfolio site ready for deployment'"
  functions = "netlify/functions"
  publish = "."

# Redirect all 404s to index.html for single-page app routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Environment variables guidance
[env.production]
  # Set these in Netlify dashboard: Production environment
  [env.production.context.environment]
    GITHUB_TOKEN = "your_personal_access_token_here"
    GITHUB_REPO = "RoboPlayz12345/blog-connect"
